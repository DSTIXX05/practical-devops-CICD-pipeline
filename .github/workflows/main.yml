name: Git Actions CI
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASS: ${{ secrets.DB_PASS }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_PORT: ${{ secrets.DB_PORT }}
    steps:
      - name: check out repository code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Run one-line script
        run: echo "Just tesing my one line."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Check node version
        run: node -v

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        run: docker compose build
          docker tag e-commerce-frontend:latest ${{ secrets.DOCKER_USERNAME }}/e-commerce-frontend:v1.0
          docker tag e-commerce-backend:latest ${{ secrets.DOCKER_USERNAME }}/e-commerce-backend:v1.0
          docker push ${{ secrets.DOCKER_USERNAME }}/e-commerce-frontend:v1.0
          docker push ${{ secrets.DOCKER_USERNAME }}/e-commerce-backend:v1.0

      - name: Push images to Docker hub
        run: |
          docker compose push e-commerce-frontend:v1.0
          docker compose push e-commerce-backend:v1.0
